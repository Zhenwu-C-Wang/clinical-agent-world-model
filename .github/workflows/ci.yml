name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Check installed package import
        run: python -c "import clinical_world_model; import clinical_world_model.planner"
      - name: Check CLI script smoke
        run: python scripts/generate_trajectories.py --count 10 --seed 42 --output /tmp/trajectories.jsonl
      - name: Run tests
        run: pytest
